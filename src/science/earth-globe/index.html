<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地球仪自转公转模拟 - Word Master</title>
  <link rel="stylesheet" href="../common/base.css">
  <style>
    /* Earth Globe Specific Overrides */
    :root {
      --bg-dark: #020617;
      --glass-bg: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(148, 163, 184, 0.2);
      --accent-blue: #38bdf8;
      --accent-green: #22c55e;
      --accent-orange: #f97316;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
    }

    .main-container {
      position: relative;
      flex: 1;
      width: 100%;
      height: 100%;
    }

    #viewport {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #viewport:active {
      cursor: grabbing;
    }

    .controls-panel {
      position: absolute;
      right: 1rem;
      top: 1rem;
      bottom: 2rem;
      max-height: calc(100vh - 3rem);
      width: 140px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 100;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-blue);
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 1rem 0 0.5rem;
    }

    .controls-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
    }

    /* Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--glass-border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .hint-overlay {
      position: absolute;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.65rem;
      color: #fff;
      border: 1px solid var(--glass-border);
      z-index: 1000;
    }

    .vertical-slider-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      height: 100px;
    }

    .vertical-slider {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      width: 8px;
      height: 100%;
      cursor: pointer;
      accent-color: var(--accent-blue);
    }

    @media (max-width: 768px) {
      .controls-panel {
        position: static;
        width: 100%;
        padding: 1rem;
        order: 2;
      }
      .main-container {
        height: 60vh;
        flex: none;
      }
    }
  </style>
</head>

<body>
  <main class="main-container">
    <div id="viewport"></div>

    <div class="hint-overlay" style="bottom: 1rem; left: 1rem;">
      <span>拖动旋转 · 滚轮缩放 · 点击寻找主要国家</span>
    </div>

    <aside class="controls-panel">
      <section class="card">
        <div class="card-title">视觉图层</div>

        <div class="section-label">地球与空间</div>
        <div class="controls-grid">
          <label class="control-item">
            <span>赤道线</span>
            <div class="switch">
              <input id="toggle-equator" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
          <label class="control-item">
            <span>经纬网格</span>
            <div class="switch">
              <input id="toggle-grid" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
          <label class="control-item">
            <span>黄道平面</span>
            <div class="switch">
              <input id="toggle-ecliptic" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
          <label class="control-item">
            <span>昼夜分界线</span>
            <div class="switch">
              <input id="toggle-terminator" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
        </div>

        <div class="section-label">星空指向</div>
        <div class="controls-grid">
          <label class="control-item">
            <span>北极星方向</span>
            <div class="switch">
              <input id="toggle-polaris" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
          <label class="control-item">
            <span>南十字星</span>
            <div class="switch">
              <input id="toggle-crux" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
        </div>

        <div class="section-label">视距缩放</div>
        <div class="controls-grid">
          <div class="vertical-slider-container">
            <input id="zoom-slider" class="vertical-slider" type="range" min="2" max="15" step="0.1" value="11" />
          </div>
        </div>

        <div class="section-label">地球自转</div>
        <div class="controls-grid">
          <label class="control-item">
            <span>自动旋转</span>
            <div class="switch">
              <input id="toggle-rotation" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
        </div>

        <div class="legend">
          <div class="legend-item"><span class="dot" style="background:#f97316"></span>赤道</div>
          <div class="legend-item"><span class="dot" style="background:#22c55e"></span>黄道</div>
          <div class="legend-item"><span class="dot" style="background:#38bdf8"></span>经纬网</div>
          <div class="legend-item"><span class="dot" style="background:#facc15"></span>昼夜</div>
        </div>
      </section>
    </aside>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>

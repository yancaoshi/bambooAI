<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>古文名言翻译 - Quote Translation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="header">
        <h1 class="title">古文名言翻译</h1>
        <div class="top-nav">
            <button id="prev-btn-top" class="nav-btn-mini" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <p class="subtitle">经典智慧 · 翻译艺术</p>
            <button id="next-btn-top" class="nav-btn-mini">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="card-container" id="card-display">
            <!-- Card will be injected here -->
            <div class="loading">加载中...</div>
        </div>
    </main>

    <footer class="footer-controls">
        <div class="controls-bar">
            <button id="prev-btn" class="control-btn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="progress-info">
                <input type="number" id="jump-input" class="jump-input" min="1" value="1"> / <span id="total-count">50</span>
            </div>
            <button id="next-btn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            <button id="random-btn" class="control-btn" title="随便看看">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"></path></svg>
            </button>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>

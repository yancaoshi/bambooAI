<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三棱镜色散实验 - 物理实验室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app-container">
    <!-- 侧边控制面板 -->
    <aside id="sidebar">
      <div class="logo">PRISM DISPERSION</div>
      
      <div class="control-group">
        <span class="group-title">棱镜参数</span>
        <label>顶角 (Apex Angle): <span id="val-apex">60</span>°</label>
        <input type="range" id="param-apex" min="30" max="90" value="60">
      </div>

      <div class="control-group">
        <span class="group-title">棱镜材质</span>
        <select id="param-material">
          <option value="crown">冠牌玻璃 (低色散)</option>
          <option value="flint">火石玻璃 (高色散)</option>
        </select>
      </div>

      <div class="control-group">
        <span class="group-title">光源控制</span>
        <label>入射位置: <span id="val-y">0</span></label>
        <input type="range" id="param-y" min="-100" max="100" value="0">
      </div>

      <div class="theory-note">
        <div class="note-title">实验提示</div>
        <p>白光是由多种颜色的光组成的。由于不同颜色的光在玻璃中的<strong>折射率</strong>不同（紫光最大，红光最小），通过棱镜后会被分解成光谱。</p>
      </div>

      <div class="stats-panel">
        <div class="stat-item">
          <div class="label">偏向角 (Deviation)</div>
          <div class="value" id="stat-dev">--</div>
        </div>
      </div>
    </aside>

    <!-- 实验绘图区 -->
    <main id="workspace">
      <canvas id="prism-canvas"></canvas>
      
      <div class="overlay-labels">
        <div class="label-item">WHITE LIGHT</div>
        <div class="label-item spectrum-label">SPECTRUM</div>
      </div>

      <div class="interaction-hint">
        拖拽中心移动 | 拖拽顶点旋转棱镜
      </div>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
